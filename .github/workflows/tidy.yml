name: Check and Update xray-core

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  actions: write
  contents: write

concurrency:
  group: update-xray-core
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout our repository
        uses: actions/checkout@v6
        with:
          fetch-depth: '0'

      - name: Setup Golang bootstrap
        uses: actions/setup-go@v6.1.0
        with:
          go-version: 'stable'

      - name: Update pinned xray-core dependency
        run: |
          bash scripts/update_xray_core.sh

      - name: Commit and push changes
        id: auto-commit-action
        if: env.UPDATED == 'true'
        uses: stefanzweifel/git-auto-commit-action@v5.1.0
        with:
          commit_message: Update xray-core to main (${{ env.LATEST_HEAD_SHORT_SHA }})
          tagging_message: ${{ env.RELEASE_TAG }}

      - name: Trigger build
        if: env.UPDATED == 'true' && steps.auto-commit-action.outputs.changes_detected == 'true'
        run: |
          set -euo pipefail
          curl -fsSL -X POST \
            -H "Accept: application/vnd.github.v3+json" \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/${{ github.repository }}/actions/workflows/main.yml/dispatches \
            -d "{
              \"ref\": \"main\",
              \"inputs\": {
                \"release_tag\": \"${{ env.RELEASE_TAG }}\"
              }
            }"
